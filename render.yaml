# Render Blueprint — Mundo dos Brinquedos
# One web service: builds the React app + runs the Express API, which also
# serves the built site. DB is Neon Postgres (set the URLs in the dashboard).
services:
  - type: web
    name: mundo-dos-brinquedos
    runtime: node
    plan: free # upgrade to "starter" ($7) to remove cold-starts once selling
    region: ohio # closest Render region to Neon us-east-1
    branch: main
    # --include=dev forces build tools (vite, tsc, prisma, tsx) to install even
    # though Render sets NODE_ENV=production.
    buildCommand: >-
      cd server && npm install --include=dev && npx prisma generate &&
      cd ../web && npm install --include=dev && npm run build
    startCommand: cd server && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ADMIN_KEY
        sync: false # set in dashboard (your admin password)
      - key: DATABASE_URL
        sync: false # Neon pooled URL (…-pooler…?sslmode=require&pgbouncer=true)
      - key: DIRECT_URL
        sync: false # Neon direct URL (no -pooler, ?sslmode=require)
